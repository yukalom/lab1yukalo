<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстр ПЗ для лабораторій</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Реєстр програмного забезпечення для лабораторій</h1>

    <div class="container">
        <section class="form-section">
            <h2 id="formTitle">Додати ПЗ</h2>
            <form id="softwareForm" novalidate>
                <div class="form-group">
                    <label for="name">Назва продукту:</label>
                    <input type="text" id="name" name="name" required placeholder="Напр: MatLab">
                    <div class="error-msg" id="nameError">Назва обов'язкова</div>
                </div>

                <div class="form-group">
                    <label for="licenseType">Тип ліцензії:</label>
                    <select id="licenseType" name="licenseType" required>
                        <option value="">-- Оберіть --</option>
                        <option value="Free">Free (Безкоштовна)</option>
                        <option value="Commercial">Commercial (Платна)</option>
                        <option value="Academic">Academic (Академічна)</option>
                    </select>
                    <div class="error-msg" id="licenseError">Оберіть тип ліцензії</div>
                </div>

                <div class="form-group">
                    <label for="version">Версія:</label>
                    <input type="number" id="version" name="version" step="0.1" required>
                    <div class="error-msg" id="versionError">Вкажіть числову версію</div>
                </div>

                <div class="form-group">
                    <label for="installDate">Дата встановлення:</label>
                    <input type="date" id="installDate" name="installDate" required>
                    <div class="error-msg" id="dateError">Оберіть коректну дату</div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Зберегти запис</button>
            </form>
        </section>

        <section class="list-section">
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Пошук за назвою...">
                <select id="filterLicense">
                    <option value="all">Усі ліцензії</option>
                    <option value="Free">Тільки Free</option>
                    <option value="Commercial">Тільки Commercial</option>
                    <option value="Academic">Тільки Academic</option>
                </select>
            </div>

            <table id="softwareTable">
                <thead>
                    <tr>
                        <th>Назва</th>
                        <th>Ліцензія</th>
                        <th>Версія</th>
                        <th>Дата</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
